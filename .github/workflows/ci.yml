name: CI (Intégration Continue)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Récupère le code source depuis votre dépôt GitHub
    - name: Checkout du code
      uses: actions/checkout@v4

    # 2. Installe l'environnement Node.js
    - name: Configuration de Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x' # Utilise la version 20 de Node
        cache: 'npm'         # Met en cache les dépendances pour accélérer les futurs lancements

    # 3. Installe les dépendances du projet (équivalent de npm install)
    - name: Installation des dépendances
      run: npm ci

    # 4. Vérifie la syntaxe et la qualité du code
    - name: Vérification du code (Lint)
      run: npm run lint

    # 5. Teste la compilation du projet pour s'assurer qu'il n'y a pas d'erreur fatale
    - name: Compilation du projet (Build)
      run: npm run build
